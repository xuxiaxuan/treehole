server:
  port: 8080

spring:
  application:
    name: treehole
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:treehole}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:change-me-in-prod}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  # 至少 32 字符；生产环境必须通过环境变量覆盖
  secret: ${JWT_SECRET:dev-secret-change-in-prod-must-be-at-least-32-chars}
  expiration: 604800  # 7 天，单位秒

# CORS 允许的前端域名
web:
  domain: ${WEB_DOMAIN:http://localhost:5173}
  admin-domain: ${ADMIN_DOMAIN:http://localhost:5174}

# AI 服务：enabled=false 时走 Noop 实现（零网络依赖）
# 启用时通过 spring.ai.ollama.* 配置 Ollama 连接
ai:
  enabled: ${AI_ENABLED:true}
  fallback:
    tarot-reading: "牌面正在为你沉淀，稍后再来看看这份解读吧。"   # 塔罗兜底文案
    warm-reply: "你的声音被听到了，请照顾好自己。"               # 树洞兜底文案
    daily-fortune: "今日适合放慢脚步，照顾自己的感受。"          # 每日运势兜底文案
  timeout:
    tarot: 30s    # 塔罗解读：内容较长，给 30s
    moderation: 10s  # 审核：短超时，避免阻塞发帖
    warm-reply: 20s
    summarize: 30s

spring.ai:
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    chat:
      model: ${OLLAMA_MODEL:qwen2.5:3b}     # 本地小模型，1-3 秒推理
      temperature: 0.7
    embedding:
      model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}  # 共鸣信号用 embedding 模型（需 ollama pull）

logging:
  level:
    com.xxx.treehole: DEBUG
