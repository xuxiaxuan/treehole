<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d7a4d"/>
      <stop offset="100%" stop-color="#1f3f2a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- 树冠 -->
  <circle cx="256" cy="200" r="90" fill="#7fb069" filter="url(#shadow)"/>
  <circle cx="200" cy="240" r="60" fill="#7fb069" filter="url(#shadow)"/>
  <circle cx="312" cy="240" r="60" fill="#7fb069" filter="url(#shadow)"/>
  <!-- 树干 -->
  <rect x="236" y="280" width="40" height="120" rx="8" fill="#8b5a3c"/>
  <!-- 草地 -->
  <ellipse cx="256" cy="420" rx="180" ry="24" fill="#5a7065" opacity="0.6"/>
  <!-- 一颗小星 -->
  <circle cx="380" cy="120" r="6" fill="#f4d03f"/>
  <circle cx="140" cy="140" r="4" fill="#f4d03f" opacity="0.7"/>
</svg>
